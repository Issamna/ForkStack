name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forkstack-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No committed package-lock.json (repo ignores lockfiles), so use install.
      - name: Install dependencies
        run: npm install

      # baseHref (/ForkStack/) is set in angular.json; production is the default.
      - name: Build
        run: npx ng build

      # GitHub Pages serves 404.html for unknown paths; make it the SPA shell so
      # deep links like /ForkStack/login work on refresh.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./forkstack-frontend/dist
          publish_branch: gh-pages
