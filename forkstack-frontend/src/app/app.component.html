<nav class="navbar">
  <div class="logo-wrapper">
    <a routerLink="/" class="flex items-center gap-3 transition">
      <img src="assets/logo.png" alt="Forkstack Icon" class="logo-image" />
      <span class="logo-text">fork-stack</span>
    </a>
    <div class="relative group ml-4">
      <a
        *ngIf="authService.isLoggedIn()"
        routerLink="/recipes/new"
        class="add-button"
      >
        +
      </a>
      <div class="tooltip">Add Recipe</div>
    </div>
  </div>
  <div class="absolute right-4 top-3">
    <div *ngIf="authService.isLoggedIn()" class="relative">
      <button
        type="button"
        (click)="toggleMenu($event)"
        class="nav-button"
        aria-haspopup="true"
        [attr.aria-expanded]="menuOpen"
        aria-label="Menu"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 6h18M3 12h18M3 18h18"></path>
        </svg>
      </button>

      <div *ngIf="menuOpen" class="dropdown-menu">
        <a routerLink="/account" class="dropdown-item">Account</a>
        <button type="button" (click)="logout()" class="dropdown-item">
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="p-4">
  <router-outlet></router-outlet>
</main>
