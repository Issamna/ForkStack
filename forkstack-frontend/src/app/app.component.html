<nav class="navbar">
  <div class="logo-wrapper">
    <a routerLink="/" class="flex items-center gap-3 transition">
      <img src="assets/logo.png" alt="Forkstack Icon" class="logo-image" />
      <span class="logo-text">fork-stack</span>
    </a>
    <div class="relative group ml-4">
      <a
        *ngIf="authService.isLoggedIn()"
        routerLink="/recipes/new"
        class="add-button"
      >
        +
      </a>
      <div class="tooltip">Add Recipe</div>
    </div>
  </div>
  <div class="absolute right-4 top-1/2 -translate-y-1/2">
    <div *ngIf="authService.isLoggedIn()" class="relative">
      <button
        type="button"
        (click)="toggleMenu($event)"
        class="nav-button"
        aria-haspopup="true"
        [attr.aria-expanded]="menuOpen"
        aria-label="Account menu"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <svg
          class="h-4 w-4 transition-transform"
          [class.rotate-180]="menuOpen"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>

      <div *ngIf="menuOpen" class="dropdown-menu">
        <a routerLink="/account" class="dropdown-item">Account</a>
        <button type="button" (click)="logout()" class="dropdown-item">
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="p-4">
  <router-outlet></router-outlet>
</main>
