<div class="page-wrapper">
  <div class="text-center mb-8">
    <h1 class="heading-primary">Welcome</h1>
    <p class="mt-2 text-subtle">Save and share your recipes</p>
  </div>

  <div class="card-box">
    <h2 class="heading-secondary">Login</h2>
    <form (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">
      <input
        [(ngModel)]="username"
        (input)="onInputChange()"
        name="username"
        placeholder="Username"
        required
        class="form-input"
      />
      <div class="relative">
        <input
          [(ngModel)]="password"
          (input)="onInputChange()"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          required
          class="form-input w-full pr-14"
        />
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-textgray"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        >
          {{ showPassword ? "Hide" : "Show" }}
        </button>
      </div>
      <label class="flex items-center gap-2 text-sm text-subtle">
        <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
        Stay logged in
      </label>
      <button type="submit" class="button-primary">Login</button>
      <p class="mt-4 text-sm text-center">
        <a routerLink="/forgot-password" class="text-accent hover:underline">
          Forgot your password?
        </a>
      </p>
      <p class="mt-6 text-sm text-center text-subtle">
        Don't have an account?
        <a routerLink="/register" class="text-accent hover:underline"
          >Create one</a
        >
      </p>
    </form>
    <div *ngIf="error" class="mt-4 text-red-600 text-sm text-center">
      {{ error }}
    </div>
  </div>
</div>
